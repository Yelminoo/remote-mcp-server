# /etc/nginx/sites-available/trello-mcp
# Symlink to sites-enabled: ln -s /etc/nginx/sites-available/trello-mcp /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name remote-mcp-server.neogrouplimited.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name remote-mcp-server.neogrouplimited.com;

    # Managed by Certbot — run:
    #   certbot --nginx -d remote-mcp-server.neogrouplimited.com
    ssl_certificate     /etc/letsencrypt/live/remote-mcp-server.neogrouplimited.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/remote-mcp-server.neogrouplimited.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── SSE timeout — keep long-lived connections open ────────────────────
    # SSE streams stay open until the client disconnects; default 60 s kills them.
    proxy_read_timeout  86400s;
    proxy_send_timeout  86400s;
    keepalive_timeout   86400s;

    # ── Proxy to Node.js MCP server ───────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # Disable buffering — REQUIRED for SSE (/sse endpoint).
        # Without this Nginx holds the stream until its buffer fills,
        # which breaks Server-Sent Events entirely.
        proxy_buffering            off;
        proxy_cache                off;
        proxy_set_header           X-Accel-Buffering no;

        # Standard reverse-proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Pass Authorization header through (Bearer token auth)
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;

        # WebSocket upgrade support (future-proofing)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # ── Health check — no auth, low timeout ──────────────────────────────
    location = /health {
        proxy_pass         http://127.0.0.1:3001/health;
        proxy_http_version 1.1;
        proxy_read_timeout 5s;
        access_log         off;
    }
}

# WebSocket connection upgrade map (needed for the Upgrade header above)
# Add this block to /etc/nginx/nginx.conf inside the http {} block if not present:
#
#   map $http_upgrade $connection_upgrade {
#       default upgrade;
#       ''      close;
#   }
